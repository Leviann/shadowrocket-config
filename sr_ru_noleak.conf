# ==============================================================
# 5. GEOIP RU -> DIRECT (catch-all for Russian IPs)
# ==============================================================
# With always-real-ip = *, all domains are resolved to real IPs.
# GEOIP checks these real IPs against the RU database.
# Blocked services (TikTok, Instagram, etc.) are already matched
# by RULE-SETs ABOVE this rule -> they go to PROXY regardless.
# Any remaining domain resolving to a Russian IP -> DIRECT.
# This catches RU apps on non-.ru domains not in our explicit list.
GEOIP,RU,DIRECT

# ==============================================================
# 6. EVERYTHING ELSE -> PROXY
# ==============================================================
FINAL,PROXY

[Host]
# Apple domains via system DNS for push/iCloud stability
*.apple.com = server:system
*.icloud.com = server:system
localhost = 127.0.0.1

[URL Rewrite]
# Google - prevent redirect to .cn
^https?://(www\.)?g\.cn https://www.google.com 302
^https?://(www\.)?google\.cn https://www.google.com 302

[MITM]
hostname = *.google.cn
